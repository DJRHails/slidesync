name: Release to PyPI

# Triggered on push of a version tag (e.g. v0.1.0). Builds the wheel + sdist
# from the tagged commit and publishes to PyPI via Trusted Publishing (OIDC) —
# no PyPI token needed; the runner mints a short-lived OIDC token that PyPI
# exchanges via the pre-registered publisher configured in PyPI's UI.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build + publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/slidesync
    permissions:
      # Required for OIDC trusted publishing.
      id-token: write

    steps:
      - name: Checkout (no creds)
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify dist
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `with:` block needed — OIDC handles auth, project is
        # `slidesync` (matches pyproject.toml `name`).
